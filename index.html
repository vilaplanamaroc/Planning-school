<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collège Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Collège Planner">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body class="bg-gray-950 text-white min-h-screen">

<div class="flex flex-col lg:flex-row h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="w-full lg:w-72 bg-gray-900 p-4 border-b lg:border-r overflow-auto">
    <h1 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-book"></i> Collège Planner</h1>
    
    <!-- Nom + Niveau -->
    <div class="bg-gray-800 p-4 rounded-xl mb-6">
      <input id="studentName" class="w-full bg-gray-700 p-3 rounded-lg mb-2" placeholder="Nom de l'élève">
      <input id="studentLevel" class="w-full bg-gray-700 p-3 rounded-lg mb-3" placeholder="Niveau (ex: 5ème)">
      <button onclick="saveStudentInfo()" class="w-full bg-green-600 py-2 rounded-lg text-sm">Enregistrer nom & niveau</button>
    </div>

    <input id="newSubject" class="w-full bg-gray-800 p-3 rounded-lg mb-2" placeholder="Nouvelle matière">
    <button onclick="addSubject()" class="w-full bg-blue-600 py-3 rounded-lg mb-4">+ Ajouter matière</button>
    <div id="subjectsList" class="space-y-2"></div>
    <button onclick="resetAll()" class="mt-8 w-full text-red-400 py-2 text-sm">🗑 Tout réinitialiser</button>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="flex border-b bg-gray-900">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active flex-1 py-4">📅 Emploi</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn flex-1 py-4">📚 Matière</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn flex-1 py-4">📊 Progression</button>
    </div>

    <!-- Emploi du Temps -->
    <div id="content0" class="flex-1 p-4 overflow-auto">
      <div class="flex justify-between items-center mb-4">
        <button onclick="prevMonth()" class="text-3xl px-4">←</button>
        <h2 class="text-xl font-semibold">Calendrier <span id="monthTitle" class="text-blue-400"></span></h2>
        <button onclick="nextMonth()" class="text-3xl px-4">→</button>
      </div>
      <div id="calendar" class="grid grid-cols-7 gap-2 text-center"></div>
      <div id="dayDetails" class="mt-8 bg-gray-900 p-6 rounded-2xl hidden"></div>
      <button onclick="exportPlanningPDF()" class="mt-6 w-full bg-indigo-600 py-3 rounded-lg">📄 Exporter ce Planning (PDF)</button>
    </div>

    <!-- Matière -->
    <div id="content1" class="flex-1 p-4 overflow-auto hidden">
      <div class="flex justify-between mb-6">
        <h2 id="selectedSubjectName" class="text-3xl font-bold"></h2>
        <div class="flex items-center gap-4">
          <div class="w-64 bg-gray-800 h-3 rounded-full overflow-hidden"><div id="subjectProgressBar" class="bg-green-500 h-3 w-0 transition-all"></div></div>
          <span id="subjectProgressText" class="font-mono">0%</span>
        </div>
      </div>
      <div class="mb-8 bg-gray-900 p-6 rounded-2xl">
        <div class="flex flex-col md:flex-row gap-3">
          <input id="newCourseName" class="flex-1 bg-gray-800 p-3 rounded-lg" placeholder="Nom du cours (ex: Révision Chapitre 5)">
          <input id="newCourseDate" type="date" class="bg-gray-800 p-3 rounded-lg">
          <button onclick="setToday()" class="bg-gray-700 px-6 rounded-lg">Aujourd'hui</button>
          <button onclick="addCourse()" class="bg-green-600 px-8 rounded-lg">Ajouter</button>
        </div>
      </div>
      <div class="mb-8 bg-gray-900 p-6 rounded-2xl">
        <h3 class="mb-4">Emploi du temps fixe hebdomadaire</h3>
        <div id="weeklySchedule" class="grid grid-cols-7 gap-2 text-center"></div>
      </div>
      <div id="coursesList" class="space-y-6"></div>
      <button onclick="exportCoursesPDF()" class="mt-6 w-full bg-indigo-600 py-3 rounded-lg">📄 Exporter Matières & Cours (PDF)</button>
    </div>

    <!-- Progression -->
    <div id="content2" class="flex-1 p-4 overflow-auto hidden">
      <h2 class="text-2xl font-bold mb-6">Progression Globale</h2>
      <div id="globalProgress" class="space-y-6"></div>
      <button onclick="exportProgressPDF()" class="mt-8 w-full bg-indigo-600 py-3 rounded-lg">📄 Exporter la Progression (PDF)</button>
    </div>
  </div>
</div>

<script>
// === TON CODE ORIGINAL EXACT (copié-collé sans rien changer) ===
let subjects = [];
let selectedSubjectId = null;
let selectedDay = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
const weekDays = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const palette = ['#22c55e','#eab308','#a855f7','#ef4444','#06b67f','#f97316','#8b5cf6'];

function loadData() {
  const saved = localStorage.getItem('subjects');
  subjects = saved ? JSON.parse(saved).map((s,i) => ({...s, schedule: s.schedule || [], courses: s.courses || [], color: s.color || palette[i%palette.length]})) : [];
}
function saveData() { localStorage.setItem('subjects', JSON.stringify(subjects)); }
function resetAll() { if(confirm('Tout supprimer ?')) { localStorage.clear(); location.reload(); } }
function prevMonth() { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(); }
function nextMonth() { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); }
function renderSubjects() {
  document.getElementById('subjectsList').innerHTML = subjects.map(s => `
    <div onclick="selectSubject(${s.id})" class="p-4 bg-gray-800 hover:bg-gray-700 rounded-2xl flex justify-between items-center cursor-pointer ${selectedSubjectId===s.id?'ring-2 ring-blue-500':''}">
      <div class="flex items-center gap-3"><div class="w-5 h-5 rounded" style="background:${s.color}"></div><span>${s.name}</span></div>
      <div class="flex gap-2"><button onclick="event.stopPropagation();editSubject(${s.id});" class="text-blue-400">✏️</button><button onclick="event.stopPropagation();deleteSubject(${s.id});" class="text-red-400">🗑</button></div>
    </div>`).join('');
}
function addSubject() {
  const name = document.getElementById('newSubject').value.trim();
  if(!name) return;
  const color = palette[subjects.length % palette.length];
  subjects.push({id:Date.now(), name, courses:[], schedule:[], color});
  document.getElementById('newSubject').value='';
  saveData(); renderSubjects();
}
function editSubject(id) {
  const subj = subjects.find(s=>s.id===id);
  const n = prompt("Nouveau nom :", subj.name);
  if(n&&n.trim()){ subj.name=n.trim(); saveData(); renderSubjects(); if(selectedSubjectId===id) renderSelectedSubject(); }
}
function deleteSubject(id) {
  if(!confirm("Supprimer ?")) return;
  subjects = subjects.filter(s=>s.id!==id);
  if(selectedSubjectId===id) selectedSubjectId=null;
  saveData(); renderSubjects(); switchTab(0);
}
function selectSubject(id){ selectedSubjectId=id; renderSubjects(); switchTab(1); }
function setToday(){ document.getElementById('newCourseDate').value = new Date().toISOString().split('T')[0]; }
function renderSelectedSubject() {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  if(!subj) return;
  document.getElementById('selectedSubjectName').textContent = subj.name;
  document.getElementById('newCourseName').value = '';
  document.getElementById('newCourseDate').value = '';
  renderWeeklySchedule();
  renderCourses();
  updateSubjectProgress();
}
function renderWeeklySchedule() {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  document.getElementById('weeklySchedule').innerHTML = weekDays.map((day,i)=>`
    <div onclick="toggleDay(${i})" class="p-3 rounded-xl cursor-pointer ${subj.schedule.includes(day)?'bg-blue-600':'bg-gray-800 hover:bg-gray-700'}">${day.slice(0,3)}</div>`).join('');
}
function toggleDay(i) {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  const day = weekDays[i];
  if(subj.schedule.includes(day)) subj.schedule = subj.schedule.filter(d=>d!==day);
  else subj.schedule.push(day);
  saveData(); renderWeeklySchedule(); renderCalendar();
}
function addCourse() {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  const name = document.getElementById('newCourseName').value.trim();
  const date = document.getElementById('newCourseDate').value;
  if(!name || !date) return;
  subj.courses.push({id:Date.now(), name, date, comp:false, rev:false, ass:false});
  saveData(); renderCourses(); updateSubjectProgress(); renderCalendar();
}
function renderCourses() {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  if(!subj) return;
  document.getElementById('coursesList').innerHTML = subj.courses.map(c => `
    <div class="bg-gray-900 p-6 rounded-2xl">
      <div class="flex justify-between mb-4">
        <div><div class="font-medium">${c.name}</div><div class="text-gray-400 text-sm">${new Date(c.date).toLocaleDateString('fr-FR')}</div></div>
        <button onclick="deleteCourse(${subj.id},${c.id});event.stopPropagation()" class="text-red-400">🗑</button>
      </div>
      <table class="w-full">
        <tr><td class="py-3">Compréhension</td><td class="text-right"><input type="checkbox" ${c.comp?'checked':''} onchange="toggleCheck(${subj.id},${c.id},'comp')"></td></tr>
        <tr><td class="py-3">Révision</td><td class="text-right"><input type="checkbox" ${c.rev?'checked':''} onchange="toggleCheck(${subj.id},${c.id},'rev')"></td></tr>
        <tr><td class="py-3">Assimilation</td><td class="text-right"><input type="checkbox" ${c.ass?'checked':''} onchange="toggleCheck(${subj.id},${c.id},'ass')"></td></tr>
      </table>
    </div>`).join('');
}
function toggleCheck(subjId,courseId,field) {
  const subj = subjects.find(s=>s.id===subjId);
  const course = subj.courses.find(c=>c.id===courseId);
  course[field] = !course[field];
  saveData(); renderCourses(); updateSubjectProgress(); renderGlobalProgress();
  if(selectedDay) showDay(selectedDay);
}
function deleteCourse(subjId,courseId) {
  const subj = subjects.find(s=>s.id===subjId);
  subj.courses = subj.courses.filter(c=>c.id!==courseId);
  saveData(); renderCourses(); updateSubjectProgress(); renderCalendar();
}
function updateSubjectProgress() {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  if(!subj) return;
  const total = subj.courses.length*3 || 1;
  const done = subj.courses.reduce((a,c)=>a+(c.comp?1:0)+(c.rev?1:0)+(c.ass?1:0),0);
  const perc = Math.round(done/total*100);
  document.getElementById('subjectProgressBar').style.width = perc + '%';
  document.getElementById('subjectProgressText').textContent = perc + '%';
}
function renderGlobalProgress() {
  document.getElementById('globalProgress').innerHTML = subjects.map(s => {
    const total = s.courses.length*3||1;
    const done = s.courses.reduce((a,c)=>a+(c.comp?1:0)+(c.rev?1:0)+(c.ass?1:0),0);
    const p = Math.round(done/total*100);
    return `<div class="bg-gray-900 p-6 rounded-2xl"><div class="flex justify-between"><span>${s.name}</span><span>${p}%</span></div><div class="h-2 bg-gray-700 rounded mt-2"><div class="bg-green-500 h-2 rounded" style="width:${p}%"></div></div></div>`;
  }).join('');
}
function renderCalendar() {
  document.getElementById('monthTitle').textContent = new Date(currentYear,currentMonth).toLocaleString('fr-FR',{month:'long',year:'numeric'});
  const cal = document.getElementById('calendar');
  cal.innerHTML = weekDays.map(d=>`<div class="text-xs text-gray-400 py-2">${d.slice(0,3)}</div>`).join('');
  const first = new Date(currentYear,currentMonth,1).getDay();
  const daysMonth = new Date(currentYear,currentMonth+1,0).getDate();
  for(let i=0;i<first;i++) cal.innerHTML += `<div></div>`;
  for(let d=1;d<=daysMonth;d++) {
    const dateObj = new Date(currentYear,currentMonth,d);
    const dayName = weekDays[dateObj.getDay()];
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const scheduled = subjects.filter(s=>(s.schedule||[]).includes(dayName));
    let squares = scheduled.map(s=>`<div class="flex-1 text-[10px] text-white rounded py-0.5 text-center font-medium" style="background:${s.color}">${s.name.slice(0,2)}</div>`).join('');
    let courseCount = 0;
    subjects.forEach(s => courseCount += s.courses.filter(c=>c.date===dateStr).length);
    const badge = courseCount ? `<div class="text-[9px] text-amber-300 mt-1">📝 ${courseCount}</div>` : '';
    const isSel = (d===selectedDay) ? 'ring-2 ring-blue-400 bg-blue-950' : 'bg-gray-900';
    cal.innerHTML += `<div onclick="showDay(${d})" class="h-28 border border-gray-700 hover:border-blue-500 rounded-2xl p-2 flex flex-col justify-between cursor-pointer ${isSel}"><div class="text-right text-2xl">${d}</div><div class="flex gap-1 mt-auto h-6">${squares}</div>${badge}</div>`;
  }
}
function showDay(day) {
  selectedDay = day; renderCalendar();
  const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const weekday = weekDays[new Date(currentYear,currentMonth,day).getDay()];
  let html = `<h3 class="font-bold text-blue-400">Jour ${day} — ${weekday}</h3><p class="text-sm text-gray-400 mb-6">${dateStr}</p>`;
  const scheduled = subjects.filter(s=>(s.schedule||[]).includes(weekday));
  if(scheduled.length) {
    html += `<p class="text-green-400 mb-2 text-xs">MATIÈRES PRÉVUES :</p><div class="flex flex-wrap gap-2 mb-6">`;
    scheduled.forEach(s=>html+=`<span class="bg-green-900 px-4 py-1 rounded-full text-sm">${s.name}</span>`);
    html += `</div>`;
  }
  let coursesHtml = '<p class="text-amber-300 mb-3 text-xs">COURS + ÉVOLUTION :</p>';
  let has = false;
  subjects.forEach(s => s.courses.filter(c=>c.date===dateStr).forEach(c => {
    has = true;
    const perc = Math.round(((c.comp?1:0)+(c.rev?1:0)+(c.ass?1:0))/3*100);
    coursesHtml += `<div class="bg-gray-800 p-4 rounded-xl mb-3"><div class="flex justify-between mb-2"><span>${s.name} — ${c.name}</span><span class="font-mono">${perc}%</span></div><div class="flex justify-between text-xs"><div>Comp. ${c.comp?'✅':'○'}</div><div>Rév. ${c.rev?'✅':'○'}</div><div>Ass. ${c.ass?'✅':'○'}</div></div></div>`;
  }));
  if(!has) coursesHtml += '<p class="text-gray-400">Aucun cours ce jour.</p>';
  document.getElementById('dayDetails').innerHTML = html + coursesHtml;
  document.getElementById('dayDetails').classList.remove('hidden');
}
function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  document.querySelectorAll('#content0,#content1,#content2').forEach((c,i)=>c.classList.toggle('hidden',i!==n));
  if(n===1 && selectedSubjectId) renderSelectedSubject();
  if(n===2) renderGlobalProgress();
}

// === AJOUTS UNIQUEMENT ===
let studentName = localStorage.getItem('studentName') || "Mohamed";
let studentLevel = localStorage.getItem('studentLevel') || "5ème";

function saveStudentInfo() {
  studentName = document.getElementById('studentName').value || studentName;
  studentLevel = document.getElementById('studentLevel').value || studentLevel;
  localStorage.setItem('studentName', studentName);
  localStorage.setItem('studentLevel', studentLevel);
  alert(`Enregistré : ${studentName} - ${studentLevel}`);
}

function exportPlanningPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text(`${studentName} - ${studentLevel}`, 20, 20);
  doc.text("Planning du mois", 20, 35);
  doc.save(`Planning_${studentName}.pdf`);
}

function exportCoursesPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text(`${studentName} - ${studentLevel}`, 20, 20);
  doc.text("Matières et Cours", 20, 35);
  let y = 50;
  subjects.forEach(s => {
    doc.text(s.name, 20, y);
    y += 10;
    s.courses.forEach(c => {
      doc.text(`  • ${c.name} (${c.date})`, 30, y);
      y += 8;
    });
  });
  doc.save(`Cours_${studentName}.pdf`);
}

function exportProgressPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text(`${studentName} - ${studentLevel}`, 20, 20);
  doc.text("Progression Globale", 20, 35);
  let y = 50;
  subjects.forEach(s => {
    const total = s.courses.length*3||1;
    const done = s.courses.reduce((a,c)=>a+(c.comp?1:0)+(c.rev?1:0)+(c.ass?1:0),0);
    const p = Math.round(done/total*100);
    doc.text(`${s.name} : ${p}%`, 20, y);
    y += 10;
  });
  doc.save(`Progression_${studentName}.pdf`);
}

// INIT
loadData();
document.getElementById('studentName').value = studentName;
document.getElementById('studentLevel').value = studentLevel;
renderSubjects();
renderCalendar();
switchTab(0);
</script>
</body>
</html>
