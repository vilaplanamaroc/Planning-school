<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collège Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- PWA - icône personnalisée -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Collège Planner">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#111827">
</head>
<body class="bg-gray-950 text-white min-h-screen">

<div class="flex flex-col lg:flex-row h-screen overflow-hidden">

  <!-- Sidebar (haut sur téléphone) -->
  <div class="w-full lg:w-72 bg-gray-900 p-4 border-b lg:border-r overflow-auto">
    <h1 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-book"></i> Collège Planner</h1>
    <input id="newSubject" class="w-full bg-gray-800 p-3 rounded-lg mb-2" placeholder="Nouvelle matière">
    <button onclick="addSubject()" class="w-full bg-blue-600 py-3 rounded-lg mb-4">+ Ajouter matière</button>
    <div id="subjectsList" class="space-y-2"></div>
    <button onclick="resetAll()" class="mt-8 w-full text-red-400 py-2 text-sm">🗑 Tout réinitialiser</button>
  </div>

  <!-- Contenu principal -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Tabs -->
    <div class="flex border-b bg-gray-900">
      <button onclick="switchTab(0)" id="tab0" class="tab-btn active flex-1 py-4 text-lg">📅 Emploi du Temps</button>
      <button onclick="switchTab(1)" id="tab1" class="tab-btn flex-1 py-4 text-lg">📚 Matière</button>
      <button onclick="switchTab(2)" id="tab2" class="tab-btn flex-1 py-4 text-lg">📊 Progression</button>
    </div>

    <!-- Emploi du Temps -->
    <div id="content0" class="flex-1 p-4 overflow-auto">
      <div class="flex justify-between items-center mb-4">
        <button onclick="prevMonth()" class="text-3xl px-4">←</button>
        <h2 class="text-xl font-semibold">Calendrier <span id="monthTitle" class="text-blue-400"></span></h2>
        <button onclick="nextMonth()" class="text-3xl px-4">→</button>
      </div>
      <div id="calendar" class="grid grid-cols-7 gap-2 text-center"></div>
      <div id="dayDetails" class="mt-8 bg-gray-900 p-6 rounded-2xl hidden"></div>
    </div>

    <!-- Matière -->
    <div id="content1" class="flex-1 p-4 overflow-auto hidden">
      <div class="flex justify-between mb-6">
        <h2 id="selectedSubjectName" class="text-3xl font-bold"></h2>
        <div class="flex items-center gap-4">
          <div class="w-64 bg-gray-800 h-3 rounded-full overflow-hidden"><div id="subjectProgressBar" class="bg-green-500 h-3 w-0 transition-all"></div></div>
          <span id="subjectProgressText" class="font-mono">0%</span>
        </div>
      </div>
      <div class="mb-8 bg-gray-900 p-6 rounded-2xl">
        <div class="flex flex-col md:flex-row gap-3">
          <input id="newCourseName" class="flex-1 bg-gray-800 p-3 rounded-lg" placeholder="Nom du cours (ex: Révision Chapitre 5)">
          <input id="newCourseDate" type="date" class="bg-gray-800 p-3 rounded-lg">
          <button onclick="setToday()" class="bg-gray-700 px-6 rounded-lg">Aujourd'hui</button>
          <button onclick="addCourse()" class="bg-green-600 px-8 rounded-lg">Ajouter</button>
        </div>
      </div>
      <div class="mb-8 bg-gray-900 p-6 rounded-2xl">
        <h3 class="mb-4">Emploi du temps fixe hebdomadaire</h3>
        <div id="weeklySchedule" class="grid grid-cols-7 gap-2 text-center"></div>
      </div>
      <div id="coursesList" class="space-y-6"></div>
    </div>

    <!-- Progression -->
    <div id="content2" class="flex-1 p-4 overflow-auto hidden">
      <h2 class="text-2xl font-bold mb-6">Progression Globale</h2>
      <div id="globalProgress" class="space-y-6"></div>
    </div>
  </div>
</div>

<script>
let subjects = [];
let selectedSubjectId = null;
let selectedDay = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
const weekDays = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const palette = ['#22c55e','#eab308','#a855f7','#ef4444','#06b67f','#f97316','#8b5cf6'];

function loadData() {
  const saved = localStorage.getItem('subjects');
  subjects = saved ? JSON.parse(saved).map((s,i) => ({...s, schedule: s.schedule || [], courses: s.courses || [], color: s.color || palette[i%palette.length]})) : [];
}
function saveData() { localStorage.setItem('subjects', JSON.stringify(subjects)); }
function resetAll() { if(confirm('Tout supprimer ?')) { localStorage.clear(); location.reload(); } }

function prevMonth() { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(); }
function nextMonth() { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); }

function renderSubjects() {
  document.getElementById('subjectsList').innerHTML = subjects.map(s => `
    <div onclick="selectSubject(${s.id})" class="p-4 bg-gray-800 hover:bg-gray-700 rounded-2xl flex justify-between items-center cursor-pointer ${selectedSubjectId===s.id?'ring-2 ring-blue-500':''}">
      <div class="flex items-center gap-3"><div class="w-5 h-5 rounded" style="background:${s.color}"></div><span>${s.name}</span></div>
      <div class="flex gap-2"><button onclick="event.stopPropagation();editSubject(${s.id});" class="text-blue-400">✏️</button><button onclick="event.stopPropagation();deleteSubject(${s.id});" class="text-red-400">🗑</button></div>
    </div>`).join('');
}

function addSubject() {
  const name = document.getElementById('newSubject').value.trim();
  if(!name) return;
  const color = palette[subjects.length % palette.length];
  subjects.push({id:Date.now(), name, courses:[], schedule:[], color});
  document.getElementById('newSubject').value='';
  saveData(); renderSubjects();
}

function editSubject(id) {
  const subj = subjects.find(s=>s.id===id);
  const n = prompt("Nouveau nom :", subj.name);
  if(n&&n.trim()){ subj.name=n.trim(); saveData(); renderSubjects(); if(selectedSubjectId===id) renderSelectedSubject(); }
}

function deleteSubject(id) {
  if(!confirm("Supprimer ?")) return;
  subjects = subjects.filter(s=>s.id!==id);
  if(selectedSubjectId===id) selectedSubjectId=null;
  saveData(); renderSubjects(); switchTab(0);
}

function selectSubject(id){ selectedSubjectId=id; renderSubjects(); switchTab(1); }
function setToday(){ document.getElementById('newCourseDate').value = new Date().toISOString().split('T')[0]; }

function renderSelectedSubject() {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  if(!subj) return;
  document.getElementById('selectedSubjectName').textContent = subj.name;
  document.getElementById('newCourseName').value = '';
  document.getElementById('newCourseDate').value = '';
  renderWeeklySchedule();
  renderCourses();
  updateSubjectProgress();
}

function renderWeeklySchedule() {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  document.getElementById('weeklySchedule').innerHTML = weekDays.map((day,i)=>`
    <div onclick="toggleDay(${i})" class="p-3 rounded-xl cursor-pointer ${subj.schedule.includes(day)?'bg-blue-600':'bg-gray-800 hover:bg-gray-700'}">${day.slice(0,3)}</div>`).join('');
}

function toggleDay(i) {
  const subj = subjects.find(s=>s.id===selectedSubjectId);
  const day = weekDays[i];
  if(subj.schedule.includes(day)) subj.schedule = subj.schedule.filter(d=>d!==day);
  else subj.schedule.push(day);
  saveData(); renderWeeklySchedule(); renderCalendar();
}

function addCourse() {
  const subj = subjects.find(s=>
